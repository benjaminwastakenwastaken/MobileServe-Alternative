<!DOCTYPE html>
<html>
<body>
    <h1> Log In </h1>
    <form action="" method="post">
        {{form.hidden_tag()}}
        
        <div>
            {{form.username.label}}<br>
            {{form.username()}}
        </div>

        <div>
            {{form.email.label}}<br>
            {{form.email()}}
        </div>

        <div>
            {{form.password.label}}<br>
            {{form.password()}}
        </div>

        <div>
            {{form.submit()}}
        </div>
    </form>
</body>
</html>
